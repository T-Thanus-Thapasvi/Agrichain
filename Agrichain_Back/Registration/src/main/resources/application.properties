# ==============================================================
# 1. APPLICATION & SERVER
# ==============================================================
spring.application.name=IAM-FARMERREGISTRATION-SERVICE
server.port=8091
spring.mvc.format.date=dd-MM-yyyy

# ==============================================================
# 2. DATABASE (MySQL & Hibernate)
# ==============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/registration?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==============================================================
# 3. EUREKA CLIENT
# ==============================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# Unique ID helps Gateway find the instance faster
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}

# ==============================================================
# 4. ACTUATOR & MONITORING (Updated)
# ==============================================================
# Expose all endpoints including mappings and metrics
management.endpoints.web.exposure.include=health,info,mappings,metrics,beans,env

# 1. HEALTH PROPERTIES
# Shows full details (disk, db, etc.) always
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# 2. METRICS PROPERTIES
# Enables the gathering of system and application metrics
management.endpoint.metrics.enabled=true
management.metrics.export.defaults.enabled=true

# 3. MAPPINGS PROPERTIES
# (Mappings doesn't require extra flags once 'exposure.include' is set)

# 4. INFO PROPERTIES (Spring Boot 3 compatibility)
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true

# Metadata for /actuator/info
info.app.name=${spring.application.name}
info.app.description=Service for handling Farmer Registration and Documents
info.app.version=1.0.0
# ==============================================================
# 5. SECURITY & JWT
# ==============================================================
jwt.secret=BYDBCQAgCEVn+1N0Nol6ICbR+gfRfvgxcqypqsDtc7MB

# ==============================================================
# 6. CLOUD & COMPATIBILITY
# ==============================================================
spring.cloud.compatibility-verifier.enabled=false
spring.main.allow-bean-definition-overriding=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

spring.servlet.multipart.enabled=true
