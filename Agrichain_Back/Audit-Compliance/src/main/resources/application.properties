# --- Application Info ---
spring.application.name=AUDIT-COMPLIANCE-SERVICE
spring.main.allow-bean-definition-overriding=true
server.port=8081
eureka.instance.prefer-ip-address=true


# --- Eureka Client Config ---
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.enabled=true

# --- Database Connection ---
spring.datasource.url=jdbc:mysql://localhost:3306/audit_compliance?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate Settings ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
