spring.application.name=SUBSIDY-SERVICE

server.port=9091

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/subsidy?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=BYDBCQAgCEVn+1N0Nol6ICbR+gfRfvgxcqypqsDtc7MB

# Eureka Client
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# ? Load Balancer ? disable Ribbon (old), use Spring Cloud LoadBalancer (new)
spring.cloud.loadbalancer.ribbon.enabled=false

# ? Circuit Breaker (Resilience4j) ? for FARMER-SERVICE calls
# How many recent calls to track
resilience4j.circuitbreaker.instances.farmerService.sliding-window-size=10
# Minimum calls before circuit can open
resilience4j.circuitbreaker.instances.farmerService.minimum-number-of-calls=5
# If 50% of calls fail, open the circuit
resilience4j.circuitbreaker.instances.farmerService.failure-rate-threshold=50
# Stay OPEN for 10 seconds, then move to HALF-OPEN to retry
resilience4j.circuitbreaker.instances.farmerService.wait-duration-in-open-state=10s
# Allow 3 test calls in HALF-OPEN state
resilience4j.circuitbreaker.instances.farmerService.permitted-number-of-calls-in-half-open-state=3
# Auto switch from OPEN to HALF-OPEN after wait duration
resilience4j.circuitbreaker.instances.farmerService.automatic-transition-from-open-to-half-open-enabled=true
# Show circuit breaker status in /actuator/health
resilience4j.circuitbreaker.instances.farmerService.register-health-indicator=true

# ? Retry config ? retry failed farmer calls up to 3 times
resilience4j.retry.instances.farmerService.max-attempts=3
resilience4j.retry.instances.farmerService.wait-duration=2s

# Actuator ? expose circuit breaker health
management.endpoints.web.exposure.include=health,info,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true