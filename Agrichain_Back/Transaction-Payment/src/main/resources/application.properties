spring.application.name=transaction-payment
server.port=8093

#market.service.url=http://localhost:8081

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/transaction-Payment?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

eureka.client.transport.client-type=restclient
# This enables the endpoints and health check
management.endpoint.beans.enabled=true

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Optional: Helps Eureka identify the instance by IP instead of hostname
eureka.instance.prefer-ip-address=true

# This exposes them over the web
management.endpoints.web.exposure.include=beans,health,info

# Hibernate Properties
#update database aromatically if change in entity
spring.jpa.hibernate.ddl-auto=update
#print every sql query into console
spring.jpa.show-sql=true
#tells hibernate the version of sql
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


logging.level.com.cts.transaction_payment.client.MarketClient=DEBUG
feign.client.config.default.loggerLevel=full

