spring.application.name=notification-service
server.port=8096
spring.main.allow.bean.definition-overriding=true

# Database - Simplified for Modern Hibernate
spring.datasource.url=jdbc:mysql://localhost:3306/notification_service_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Logging - Keep your code DEBUG, but keep Spring clean
logging.level.root=INFO
logging.level.com.cts.report_service=DEBUG
logging.level.org.springframework=INFO

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.enabled=true

