@if (toastService.toast(); as currentToast) {
    <div class="toast shine" [ngClass]="currentToast.type">
        <span class="toast-message">{{ currentToast.message }}</span>
        <button class="toast-close" (click)="toastService.clear()">
            <fa-icon [icon]="faClose" />
        </button>
    </div>
}
