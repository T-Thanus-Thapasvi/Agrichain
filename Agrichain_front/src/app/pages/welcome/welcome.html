<div class="a-public-page welcome-page">
	<div class="glass-card">
		<h1 class="hero-title">Welcome to <website-name></website-name></h1>

		<p class="hero-description">
			AgriChain is a next-generation supply chain ecosystem that connects
			producers directly to the global market. By eliminating unnecessary
			intermediaries, we ensure <strong>fairer prices for farmers</strong>
			and <strong>fresher produce for consumers.</strong>
		</p>

		<div class="trust-indicators">
			<div class="indicator">
				<fa-icon [icon]="faShield" />
				<p>Verified Transactions</p>
			</div>
			<div class="indicator">
				<fa-icon [icon]="faTractor" />
				<p>Direct Sourcing</p>
			</div>
			<div class="indicator">
				<fa-icon [icon]="faThunderstorm" />
				<p>Market Linkage</p>
			</div>
		</div>

		<button class="btn btn-primary" routerLink="/login">Get Started</button>
	</div>
	<img src="/lander.png" class="lander-image"/>
</div>
